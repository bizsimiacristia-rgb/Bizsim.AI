<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Weather Dashboard</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f4f4f4;\n            margin: 0;\n            padding: 20px;\n        }\n        .dashboard {\n            max-width: 600px;\n            margin: auto;\n            background: white;\n            padding: 20px;\n            border-radius: 8px;\n            box-shadow: 0 0 10px rgba(0,0,0,0.1);\n        }\n        input[type='text'] {\n            padding: 10px;\n            width: calc(100% - 22px);\n            margin-bottom: 10px;\n            border: 1px solid #ddd;\n            border-radius: 4px;\n        }\n        button {\n            padding: 10px;\n            background-color: #28a745;\n            color: white;\n            border: none;\n            border-radius: 4px;\n            cursor: pointer;\n        }\n        button:hover {\n            background-color: #218838;\n        }\n        .weather-result {\n            margin-top: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div class="dashboard">\n        <h1>Weather Dashboard</h1>\n        <input type="text" id="location" placeholder="Enter a location">\n        <button id="fetch-weather">Get Weather</button>\n        <div class="weather-result" id="weather-result"></div>\n    </div>\n    <script>\n        document.getElementById('fetch-weather').addEventListener('click', function() {\n            const location = document.getElementById('location').value;\n            fetch(`https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&hourly=temperature_2m`)\n                .then(response => response.json())\n                .then(data => {\n                    const temperature = data.hourly.temperature_2m[0];\n                    document.getElementById('weather-result').innerHTML = `<h2>Current Temperature in ${location}: ${temperature}°C</h2>`;\n                })\n                .catch(error => {\n                    console.error('Error fetching weather data:', error);\n                    document.getElementById('weather-result').innerHTML = `<p>Failed to fetch weather data.</p>`;\n                });\n        });\n    </script>\n</body>\n</html>
